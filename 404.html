<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/svg+xml" href="/lemonlabs/favicon.svg?v=2" />
        <link rel="shortcut icon" href="/lemonlabs/favicon.svg?v=2" />
        <meta name="theme-color" content="#facc15" />
        <title>LemonLabs</title>

        <script type="text/javascript">
            const repo = "/lemonlabs";
            const path = window.location.pathname;

            if (path.startsWith(repo)) {
                const cleanPath = path.replace(repo, "");
                const redirectTo = repo + "/?redirect=" + encodeURIComponent(cleanPath + window.location.search + window.location.hash);
                window.location.replace(redirectTo);
            } else {
                window.location.replace(repo + "/");
            }
        </script>
    </head>

    <body></body>
</html>
